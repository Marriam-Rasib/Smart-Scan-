<!DOCTYPE html>
<html>
<head>
<style>
 
body {
    background:#020617;
    color:white;
    font-family:Arial;
    padding:30px;
}
.card {
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
.safe {color:#22c55e;}
.danger {color:#ef4444;}
</style>
</head>
<body>

<h1>📊 Analysis Result</h1>

<div class="card">
<h2>📂 Contract Category</h2>
<p>{{ category }}</p>
</div>

<div class="card">
 <h2>⚠️ Vulnerability Detection</h2>

<p>Status: {{ vuln_status }}</p>
<p>Top Issue: {{ vulnerability }}</p>
<p>Confidence: {{ confidence }}%</p>

<h3>All Scores:</h3>
<ul>
  {% for key, value in all_scores.items() %}
    <li>{{ key }} → {{ value }}%</li>
  {% endfor %}
</ul>
</div>

</body>
</html>
